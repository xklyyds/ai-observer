<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI前沿观察者 - 日报仪表盘</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                    <span class="logo-text">AI前沿观察者</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#/" class="nav-item active" data-route="/">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="9" y1="9" x2="15" y2="9"></line>
                        <line x1="9" y1="15" x2="15" y2="15"></line>
                        <line x1="12" y1="3" x2="12" y2="21"></line>
                    </svg>
                    <span>仪表盘</span>
                </a>
                <a href="#/reports" class="nav-item" data-route="/reports">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>日报列表</span>
                </a>
                <a href="#/search" class="nav-item" data-route="/search">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>搜索新闻</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="data-stats">
                    <div class="stat">
                        <span class="stat-value" id="totalReports">0</span>
                        <span class="stat-label">日报</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value" id="totalNews">0</span>
                        <span class="stat-label">新闻</span>
                    </div>
                </div>
                <div class="last-update" id="lastUpdate">更新中...</div>
            </div>
        </aside>

        <main class="main-content" id="mainContent">
            <header class="top-bar">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <div class="top-bar-title" id="pageTitle">仪表盘</div>
                <div class="top-bar-actions">
                    <button class="action-btn" onclick="App.refreshData()">
                        <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        <span>刷新</span>
                    </button>
                </div>
            </header>
            
            <div class="content-area" id="app"></div>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
