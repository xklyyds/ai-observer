<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>前沿科技观察 · Frontier Observer</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <a href="#" class="brand-link" onclick="App.navigateHome()">
                    <div class="brand-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <span class="brand-name">前沿科技观察</span>
                        <span class="brand-sub">Frontier Observer</span>
                    </div>
                </a>
            </div>

            <div class="sidebar-search">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索文章..."
                       onkeydown="if(event.key==='Enter')App.search()">
            </div>

            <nav class="category-nav" id="categoryNav">
                <div class="category-nav-header">
                    <span>研究领域</span>
                </div>
                <div class="category-tree" id="categoryTree"></div>
            </nav>

            <div class="sidebar-subscribe" id="subscribeSection">
                <div class="subscribe-label">订阅更新</div>
                <div class="subscribe-form" id="subscribeForm">
                    <input type="email" id="subscribeEmail" placeholder="your@email.com">
                    <button id="subscribeBtn" onclick="App.subscribe()">订阅</button>
                </div>
                <div class="subscribe-msg" id="subscribeMsg"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-area" id="mainArea">
            <!-- Top Bar -->
            <header class="top-bar">
                <button class="sidebar-toggle" id="sidebarToggle" onclick="App.toggleSidebar()">
                    <span></span><span></span><span></span>
                </button>

                <div class="stats-bar" id="statsBar">
                    <div class="stat-item">
                        <span class="stat-num" id="statArticles">0</span>
                        <span class="stat-label">篇文章</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="statSources">0</span>
                        <span class="stat-label">数据源</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-num" id="statSubscribers">0</span>
                        <span class="stat-label">订阅者</span>
                    </div>
                </div>

                <button class="refresh-btn" onclick="App.refresh()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </header>

            <!-- Filters -->
            <div class="filter-bar" id="filterBar">
                <div class="filter-pills" id="activeFilters"></div>
                <div class="filter-actions">
                    <select class="filter-select" id="importanceFilter" onchange="App.filterChanged()">
                        <option value="">全部重要性</option>
                        <option value="breakthrough">重大突破</option>
                        <option value="important">重要进展</option>
                        <option value="normal">常规</option>
                    </select>
                    <select class="filter-select" id="languageFilter" onchange="App.filterChanged()">
                        <option value="">全部语言</option>
                        <option value="zh">中文</option>
                        <option value="en">英文</option>
                    </select>
                </div>
            </div>

            <!-- Article Grid -->
            <div class="article-grid" id="articleGrid">
                <div class="loading-state">加载中...</div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination"></div>
        </main>

        <!-- Right Panel: Trending -->
        <aside class="right-panel" id="rightPanel">
            <div class="panel-section">
                <h3 class="panel-title">热门领域</h3>
                <div class="trending-list" id="trendingList"></div>
            </div>
            <div class="panel-section">
                <h3 class="panel-title">热门标签</h3>
                <div class="tag-cloud" id="tagCloud"></div>
            </div>
        </aside>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
